<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>몰타·영국·아일랜드 어학연수 학교 지도 | 종로유학원</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">

<style>
:root{
  --navy:#0F2B46; --navy-2:#1B3E60; --ink:#16202B; --body:#4A5560; --mute:#8A929B;
  --line:#E3E7EC; --bg:#F5F7FA; --card:#FFFFFF;
  --yellow:#FFDE59; --green:#C0FF72; --accent:#0B63CE;
  --kaplan:#0B63CE; --ef:#D9483B;
  --sh:0 1px 3px rgba(15,43,70,.06),0 8px 24px rgba(15,43,70,.06);
  --r:14px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%}
body{font-family:'Noto Sans KR',-apple-system,sans-serif;background:var(--bg);color:var(--ink);
  overflow:hidden;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:0;background:none;color:inherit}

/* ---------- 헤더 ---------- */
header{position:fixed;top:0;left:0;right:0;height:58px;z-index:40;background:var(--navy);
  display:flex;align-items:center;gap:12px;padding:0 16px;padding-top:env(safe-area-inset-top)}
.brand{display:flex;align-items:baseline;gap:9px;min-width:0}
.brand b{color:#fff;font-size:16px;font-weight:900;letter-spacing:-.3px;white-space:nowrap}
.brand i{font-style:normal;color:var(--yellow);font-size:11.5px;font-weight:500;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.htools{margin-left:auto;display:flex;gap:8px;flex-shrink:1;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.htools::-webkit-scrollbar{display:none}
.hbtn{flex-shrink:0}
.hbtn{height:32px;padding:0 12px;border-radius:999px;font-size:12.5px;font-weight:700;
  background:rgba(255,255,255,.12);color:#fff;display:flex;align-items:center;gap:5px;transition:.15s}
.hbtn:hover{background:rgba(255,255,255,.2)}
.hbtn.on{background:var(--yellow);color:var(--navy)}

/* ---------- 지도 ---------- */
#map{position:fixed;inset:58px 0 0 0}
@media(min-width:861px){#map{left:392px}}

/* ---------- 핀 ---------- */
.pin{cursor:pointer;will-change:transform}
.city-pin{display:flex;flex-direction:column;align-items:center;gap:3px}
.city-pin .bub{background:var(--navy);color:#fff;border-radius:999px;padding:7px 13px 7px 9px;
  display:flex;align-items:center;gap:7px;box-shadow:0 3px 12px rgba(15,43,70,.3);
  border:2px solid #fff;transition:transform .12s}
.city-pin:hover .bub{transform:scale(1.06)}
.city-pin .cnt{background:var(--yellow);color:var(--navy);font-size:11px;font-weight:900;
  width:19px;height:19px;border-radius:50%;display:grid;place-items:center;flex-shrink:0}
.city-pin .nm{font-size:13px;font-weight:700;letter-spacing:-.2px;white-space:nowrap}
.city-pin .tail{width:2px;height:9px;background:var(--navy);opacity:.5;border-radius:1px}

.dot{transform:translateY(50%);cursor:pointer}
.dot .body{width:34px;height:34px;border-radius:50%;border:3px solid #fff;
  display:grid;place-items:center;box-shadow:0 2px 8px rgba(15,43,70,.35);transition:transform .12s}
.dot:hover .body{transform:scale(1.18)}
.dot.sel .body{transform:scale(1.25);box-shadow:0 0 0 4px rgba(255,222,89,.55),0 2px 8px rgba(15,43,70,.35)}
.dot .body span{color:#fff;font-size:10px;font-weight:900;letter-spacing:-.3px}
.dot.res .body{width:22px;height:22px;background:#fff;border:2.5px solid var(--navy-2);
  box-shadow:0 0 0 2px rgba(255,255,255,.9),0 2px 6px rgba(15,43,70,.3)}
.leaflet-tile{filter:grayscale(.85) brightness(1.06) contrast(.92)}
.dot .body img{width:74%;height:74%;object-fit:contain;pointer-events:none}
.badge.logo{background:#fff}
.badge img{width:78%;height:78%;object-fit:contain}
.ctabs{display:flex;gap:6px;padding:10px 14px 4px}
.ctabs button{flex:1;height:34px;border-radius:10px;font-size:12.5px;font-weight:800;
  background:var(--bg);color:var(--body);border:1px solid var(--line);cursor:pointer}
.ctabs button.on{background:#0F2B46;color:#fff;border-color:#0F2B46}
.cta{padding:8px 12px !important}
.cta .p{height:42px !important;font-size:14px !important}
.cta .s{width:42px !important;height:42px !important}
.dot.res.k .body{border-color:var(--kaplan)} .dot.res.e .body{border-color:var(--ef)}
.dot.res.dim{opacity:.28}

/* ---------- 패널 ---------- */
#panel{position:fixed;z-index:30;background:var(--card);display:flex;flex-direction:column;
  box-shadow:var(--sh)}
@media(min-width:861px){
  #panel{top:58px;left:0;bottom:0;width:392px;border-right:1px solid var(--line)}
}
@media(max-width:860px){
  #panel{left:0;right:0;bottom:0;height:82vh;border-radius:20px 20px 0 0;
    transform:translateY(calc(100% - 62px));transition:transform .3s cubic-bezier(.32,.72,0,1);
    box-shadow:0 -4px 30px rgba(15,43,70,.16)}
  #panel.open{transform:translateY(calc(82vh - 44vh))}
  #panel.full{transform:translateY(0)}
  #grab{height:22px;display:grid;place-items:center;flex-shrink:0;cursor:grab;touch-action:none}
  #grab::before{content:'';width:38px;height:4px;border-radius:2px;background:#D3D9E0}
}
@media(min-width:861px){#grab{display:none}}

#ptop{padding:12px 16px;border-bottom:1px solid var(--line);flex-shrink:0;
  display:flex;align-items:center;gap:10px;min-height:52px}
#back{width:30px;height:30px;border-radius:9px;background:var(--bg);display:none;
  place-items:center;flex-shrink:0;color:var(--body);font-size:15px}
#back:hover{background:#E9EDF2}
#back.show{display:grid}
#ptitle{font-size:15px;font-weight:900;letter-spacing:-.3px;flex:1;min-width:0;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#pcount{font-size:11px;color:var(--mute);font-weight:500;flex-shrink:0}
#pbody{flex:1;overflow-y:auto;overscroll-behavior:contain;-webkit-overflow-scrolling:touch}
#pbody::-webkit-scrollbar{width:5px}
#pbody::-webkit-scrollbar-thumb{background:#D3D9E0;border-radius:3px}

/* ---------- 리스트 ---------- */
.row{padding:13px 16px;border-bottom:1px solid var(--line);cursor:pointer;
  display:flex;align-items:center;gap:11px;transition:background .12s}
.row:hover{background:var(--bg)}
.badge{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;flex-shrink:0;
  color:#fff;font-size:10.5px;font-weight:900;letter-spacing:-.3px}
.rmain{flex:1;min-width:0}
.rt{font-size:13.5px;font-weight:700;letter-spacing:-.2px;margin-bottom:2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rs{font-size:11.5px;color:var(--mute);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chev{color:#C7CED6;font-size:16px;flex-shrink:0}

/* ---------- 상세 ---------- */
.sec{padding:16px}
.sec+.sec{border-top:8px solid var(--bg)}
.hd{display:flex;gap:11px;align-items:flex-start;margin-bottom:12px}
.hd .badge{width:42px;height:42px;border-radius:11px;font-size:12px}
.hd h2{margin:0 0 3px;font-size:16px;font-weight:900;letter-spacing:-.4px;line-height:1.35}
.hd p{margin:0;font-size:11.5px;color:var(--mute)}
.desc{font-size:13px;line-height:1.75;color:var(--body);margin:0}
.tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:11px}
.tag{background:var(--bg);color:var(--body);font-size:11px;font-weight:500;
  padding:5px 10px;border-radius:999px;border:1px solid var(--line)}
.tag.y{background:#FFF9E0;border-color:#FFE9A3;color:#7A5C00}

.st{font-size:10.5px;font-weight:900;color:var(--mute);letter-spacing:.6px;
  text-transform:uppercase;margin:0 0 9px}
.kv{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--line);font-size:12.5px}
.kv:last-child{border:0}
.kv dt{color:var(--mute);width:82px;flex-shrink:0;font-weight:500}
.kv dd{margin:0;color:var(--ink);flex:1;line-height:1.6}
.hi{background:#FFFCF0;border:1px solid #FFE9A3;border-radius:10px;padding:11px 13px;
  font-size:12.5px;line-height:1.7;color:#5C4A00}
.hi b{display:block;font-size:10.5px;font-weight:900;color:#997100;letter-spacing:.5px;margin-bottom:4px}

.cta{position:sticky;bottom:0;background:var(--card);border-top:1px solid var(--line);
  padding:11px 16px;padding-bottom:calc(11px + env(safe-area-inset-bottom));display:flex;gap:8px}
.cta a,.cta button{flex:1;height:42px;border-radius:11px;font-size:13px;font-weight:700;
  display:flex;align-items:center;justify-content:center;gap:6px;text-decoration:none;transition:.15s}
.cta .p{background:var(--navy);color:#fff}
.cta .p:hover{background:var(--navy-2)}
.cta .s{background:var(--bg);color:var(--body);border:1px solid var(--line);flex:0 0 46px}
.cta .s:hover{background:#E9EDF2}

.empty{padding:40px 20px;text-align:center;color:var(--mute);font-size:12.5px;line-height:1.7}
.legend{position:fixed;right:12px;bottom:12px;z-index:20;background:rgba(255,255,255,.96);
  border:1px solid var(--line);border-radius:11px;padding:9px 11px;box-shadow:var(--sh);
  font-size:11px;color:var(--body);display:flex;flex-direction:column;gap:6px}
@media(max-width:860px){.legend{display:none}}
.lg{display:flex;align-items:center;gap:7px}
.lg i{width:11px;height:11px;border-radius:50%;display:block;flex-shrink:0}
.lg i.r{background:#fff;border:2px solid var(--navy-2);width:9px;height:9px}
</style>
</head>

let map, view={t:"country"}, filter="all", mk=[], selCenter=null;
const $ = s => document.querySelector(s);
const isMobile = () => window.innerWidth <= 860;
const openable = r => r.status === "운영중";
const city = id => D.cities.find(c => c.city_id === id);
const school = id => D.schools.find(s => s.school_id === id);
const esc = s => String(s??"").replace(/[&<>"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
const val = v => (!v || v === "미확인") ? null : String(v).replace(/\s*\[(추정|확인필요)\]/g, "");

function centersOf(cid){
  return D.centers.filter(c => c.city_id === cid && openable(c) && (filter === "all" || c.school_id === filter));
}
function resOf(centerId){
  return D.residences.filter(r => openable(r) &&
    String(r.linked_center||"").split(";").map(s=>s.trim()).includes(centerId));
}


function bootMap(){
  if(typeof google === "undefined" || !google.maps){
    document.getElementById("map").innerHTML =
      '<div style="padding:24px;font:14px/1.6 sans-serif;color:#c00">지도 라이브러리를 불러오지 못했습니다.</div>';
    return;
  }
  initMap();
}
function initMap(){
  map = new google.maps.Map(document.getElementById("map"), {
    center: {lat: 53.4, lng: -2.4}, zoom: 6,
    mapId: "DEMO_MAP_ID",
    zoomControl: !isMobile(),
    mapTypeControl: false, fullscreenControl: false, streetViewControl: false,
    clickableIcons: false, gestureHandling: "greedy"
  });
  goCountry();
}
function clearMk(){ mk.forEach(m => m.map = null); mk = []; _stack = {}; }
function el(html){ const d = document.createElement("div"); d.innerHTML = html.trim(); return d.firstChild; }
let _stack = {};
function add(lat,lng,node,z){
  const k = lat.toFixed(5)+","+lng.toFixed(5);
  const n = _stack[k] = (_stack[k]||0)+1;
  if(n > 1){ lng += 0.00055*(n-1)*((n%2)?1:-1); lat -= 0.00025*(n-1); }
  const h = node.onclick; node.onclick = null;
  const m = new google.maps.marker.AdvancedMarkerElement({
    map, position: {lat, lng}, content: node,
    zIndex: (z||0)*100, gmpClickable: !!h
  });
  if(h) m.addEventListener("gmp-click", h);
  mk.push(m); return m;
}

/* ---------- 지도 렌더 ---------- */
function render(){
  clearMk();
  if(view.t === "country"){
    D.cities.forEach(c => {
      if(isMT(c.city_id) !== (ctab === "mt")) return;
      const n = centersOf(c.city_id).length;
      if(!n || !c.lat) return;
      const p = el(`<div class="pin city-pin"><div class="bub"><span class="cnt">${n}</span>
        <span class="nm">${esc(c.name_ko)}</span></div><div class="tail"></div></div>`);
      p.onclick = () => goCity(c.city_id);
      add(c.lat, c.lng, p, 10);
    });
    fit(D.cities.filter(c => isMT(c.city_id) === (ctab === "mt") && centersOf(c.city_id).length && c.lat), ctab === "mt" ? 12 : 6);
  } else {
    const cs = centersOf(view.city);
    cs.forEach(c => {
      if(!c.lat) return;
      const p = el(`<div class="pin dot ${selCenter===c.center_id?'sel':''}">
        <div class="body" style="background:#fff;border-color:${COL[c.school_id]}">${
          LOGO[c.school_id] ? `<img src="${LOGO[c.school_id]}" alt="${ABBR[c.school_id]}">`
                            : `<span style="color:${COL[c.school_id]}">${ABBR[c.school_id]}</span>`}</div></div>`);
      p.onclick = () => goCenter(c.center_id);
      add(c.lat, c.lng, p, 20);
    });
    const sc = cs.find(x => x.center_id === selCenter);
    if(sc) resOf(sc.center_id).forEach(r => {
      if(!r.lat) return;
      const p = el(`<div class="pin dot res"><div class="body" style="border-color:${COL[sc.school_id]}">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="#0F2B46"><path d="M12 3 2 12h3v8h6v-5h2v5h6v-8h3z"/></svg></div></div>`);
      p.onclick = () => { const t = document.getElementById("r-"+r.residence_id);
        if(t){ t.scrollIntoView({behavior:"smooth",block:"center"}); t.style.background="#FFF9E0";
               setTimeout(()=>t.style.background="",1400); } };
      add(r.lat, r.lng, p, 5);
    });
    if(sc) fit([sc, ...resOf(sc.center_id)].filter(x => x && x.lat), 14);
    else fit(cs.filter(x => x.lat), 13);
  }
}
function fit(items, max){
  if(!items.length) return;
  if(items.length === 1){ map.setCenter({lat: items[0].lat, lng: items[0].lng}); map.setZoom(max); return; }
  const b = new google.maps.LatLngBounds();
  items.forEach(i => b.extend({lat: i.lat, lng: i.lng}));
  const pad = isMobile()
    ? {top: 70, left: 40, right: 40, bottom: Math.round(window.innerHeight*.46)}
    : {top: 60, left: 60, right: 60, bottom: 60};
  map.setOptions({maxZoom: max});
  map.fitBounds(b, pad);
  google.maps.event.addListenerOnce(map, "idle", () => map.setOptions({maxZoom: null}));
}

/* ---------- 내비게이션 ---------- */
function goCountry(){ view={t:"country"}; selCenter=null; render(); paint(); sheet(false); }
function goCity(id){ view={t:"city",city:id}; selCenter=null; render(); paint(); sheet(true); }
function goCenter(id){
  const c = D.centers.find(x => x.center_id === id);
  view={t:"center",city:c.city_id,center:id}; selCenter=id; render(); paint(); sheet(true);
  $("#pbody").scrollTop = 0;
}

/* ---------- 패널 ---------- */
function paint(){
  const B = $("#pbody"), T = $("#ptitle"), C = $("#pcount"), K = $("#back");
  if(view.t === "country"){
    K.classList.remove("show");
    T.textContent = ctab === "mt" ? "몰타 전체" : "영국·아일랜드 전체";
    const list = D.cities.filter(c => isMT(c.city_id) === (ctab === "mt") && centersOf(c.city_id).length);
    C.textContent = `${list.length}개 도시 · ${list.reduce((s,c) => s + centersOf(c.city_id).length, 0)}개 센터`;
    B.innerHTML = `<div class="ctabs">
      <button class="${ctab==='ukie'?'on':''}" onclick="setTab('ukie')">영국 · 아일랜드</button>
      <button class="${ctab==='mt'?'on':''}" onclick="setTab('mt')">몰타</button></div>` +
      list.map(c => {
      const cs = centersOf(c.city_id);
      const bs = [...new Set(cs.map(x => x.school_id))];
      return `<div class="row" onclick="goCity('${c.city_id}')">
        <div class="badge" style="background:${bs.length>1?'#0F2B46':COL[bs[0]]}">${cs.length}</div>
        <div class="rmain"><div class="rt">${esc(c.name_ko)} <span style="color:#B4BCC5;font-weight:500">${esc(c.name_en)}</span></div>
        <div class="rs">${esc(c.features)}</div></div><div class="chev">›</div></div>`;
    }).join("") || `<div class="empty">해당 브랜드의 센터가 없습니다</div>`;
  }
  else if(view.t === "city"){
    K.classList.add("show");
    const c = city(view.city), cs = centersOf(view.city);
    T.textContent = `${c.name_ko} ${c.name_en}`;
    C.textContent = `센터 ${cs.length}`;
    B.innerHTML = `<div class="sec">
      <p class="desc">${esc(c.intro)}</p>
      <div class="tags">${String(c.features).split(",").map(f =>
        `<span class="tag">${esc(f.trim())}</span>`).join("")}</div></div>
      <div class="sec"><p class="st">이 도시의 어학원</p>
      ${cs.map(x => {
        const nr = resOf(x.center_id).length;
        return `<div class="row" style="margin:0 -16px;padding-left:16px;padding-right:16px" onclick="goCenter('${x.center_id}')">
          <div class="badge ${LOGO[x.school_id]?'logo':''}" style="${LOGO[x.school_id]?`border:1.5px solid ${COL[x.school_id]}`:`background:${COL[x.school_id]}`}">${LOGO[x.school_id]?`<img src="${LOGO[x.school_id]}">`:ABBR[x.school_id]}</div>
          <div class="rmain"><div class="rt">${esc(x.name_en)}</div>
          <div class="rs">${nr ? `기숙사 ${nr}곳` : "기숙사 정보 없음"}</div></div>
          <div class="chev">›</div></div>`;
      }).join("")}</div>`;
  }
  else {
    K.classList.add("show");
    const c = D.centers.find(x => x.center_id === view.center);
    const s = school(c.school_id), rs = resOf(c.center_id), ct = city(c.city_id);
    T.textContent = c.name_en;
    C.textContent = ct.name_ko;
    const kv = [["주소",c.address],["최소 연령",val(c.min_age) && val(c.min_age)+"세"],
      ["평균 학급",val(c.avg_class_size)],["주요 국적",val(c.main_nationalities)],
      ["주요 과정",val(c.key_courses)],["시설",val(c.facilities)]]
      .filter(x => x[1]).map(x => `<div class="kv"><dt>${x[0]}</dt><dd>${esc(x[1])}</dd></div>`).join("");
    B.innerHTML = `<div class="sec">
      <div class="hd"><div class="badge ${LOGO[c.school_id]?'logo':''}" style="${LOGO[c.school_id]?`border:1.5px solid ${COL[c.school_id]}`:`background:${COL[c.school_id]}`}">${LOGO[c.school_id]?`<img src="${LOGO[c.school_id]}">`:ABBR[c.school_id]}</div>
      <div><h2>${esc(c.name_en)}</h2><p>${esc(s.name_ko)} · ${esc(ct.name_ko)}</p></div></div>
      <p class="desc">${esc(c.intro)}</p>
      ${val(c.highlights) ? `<div class="hi" style="margin-top:12px"><b>상담 포인트</b>${esc(val(c.highlights))}</div>` : ""}
      </div>
      <div class="sec"><p class="st">센터 정보</p>${kv}</div>
      <div class="sec"><p class="st">이 학교의 기숙사 ${rs.length ? `(${rs.length})` : ""}</p>
      ${rs.length ? rs.map(r => {
        const d = [val(r.type), val(r.room_types), val(r.commute)].filter(Boolean).join(" · ");
        return `<div id="r-${r.residence_id}" class="row" style="margin:0 -16px;padding-left:16px;padding-right:16px;cursor:default;transition:background .3s">
          <div class="badge" style="background:#fff;border:2px solid ${COL[c.school_id]};color:${COL[c.school_id]};font-size:14px">◆</div>
          <div class="rmain"><div class="rt">${esc(r.name_en)}</div>
          <div class="rs">${esc(d || r.address)}</div></div></div>`;
      }).join("") : `<div class="empty" style="padding:24px 0">등록된 기숙사 정보가 없습니다</div>`}
      </div>
      <div class="cta">
        <a class="p" href="${CONSULT}" target="_blank">상담 예약하기</a>
        <button class="s" onclick="mapLink('${esc(c.address)}')" title="구글맵에서 열기">↗</button>
      </div>`;
  }
}
function mapLink(a){ window.open("https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(a), "_blank"); }

/* ---------- 시트 (모바일) ---------- */
function sheet(open){ if(!isMobile()) return; const p = $("#panel");
  p.classList.remove("full"); p.classList.toggle("open", open); }
$("#grab").onclick = () => { const p = $("#panel");
  if(p.classList.contains("full")) p.classList.remove("full");
  else if(p.classList.contains("open")) p.classList.add("full");
  else p.classList.add("open"); };
$("#back").onclick = () => view.t === "center" ? goCity(view.city) : goCountry();
const FILTERS = ["all"].concat(D.schools.map(s => s.school_id));
FILTERS.forEach(k => $("#f-"+k).onclick = () => {
  filter = k;
  FILTERS.forEach(x => $("#f-"+x).classList.toggle("on", x === k));
  if(view.t === "center") view = {t:"city", city:view.city};
  if(view.t === "city" && !centersOf(view.city).length) view = {t:"country"};
  selCenter = null; render(); paint();
});
window.goCity = goCity; window.goCenter = goCenter; window.mapLink = mapLink;

/* 모바일 시트 드래그 */
let sy=0, so=false;
$("#grab").addEventListener("touchstart", e => { sy = e.touches[0].clientY; so = $("#panel").classList.contains("open"); }, {passive:true});
$("#grab").addEventListener("touchend", e => {
  const dy = e.changedTouches[0].clientY - sy;
  if(Math.abs(dy) > 30){ const p = $("#panel");
    if(dy < 0){ p.classList.contains("open") ? p.classList.add("full") : p.classList.add("open"); }
    else { p.classList.contains("full") ? p.classList.remove("full") : p.classList.remove("open"); } }
}, {passive:true});
